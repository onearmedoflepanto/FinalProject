    const labels = Object.keys(apiData.gold); // 시간 라벨
    const formatLabels = labels.map(label => new Date(label).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }));

    const goldPrices = labels.map(label => apiData.gold[label]);
    const silverPrices = labels.map(label => apiData.silver[label]);
    const oilPrices = labels.map(label => apiData.oil[label]);

    const createChart = (ctxId, label, data, color) => {
      const ctx = document.getElementById(ctxId).getContext('2d');
      new Chart(ctx, {
        type: 'line',
        data: {
          labels: formatLabels,
          datasets: [{
            label: label,
            data: data,
            borderColor: color,
            backgroundColor: 'transparent',
            pointRadius: 0,
            borderWidth: 2,
            tension: 0.3
          }]
        },
        options: {
          responsive: true,
          scales: {
            x: {
              title: { display: true, text: '시간' }
            },
            y: {
              title: { display: true, text: '가격' },
              beginAtZero: false
            }
          },
          plugins: {
            legend: { display: true }
          }
        }
      });
    };

    createChart('goldChart', 'Gold Price', goldPrices, 'gold');
    createChart('silverChart', 'Silver Price', silverPrices, 'silver');
    createChart('oilChart', 'Oil Price', oilPrices, 'green');
